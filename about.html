<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Our Company | BESCOS Contracting</title>
    <style>
        /* Base Styling & Brand Colors */
        :root {
            --primary: #f39c12;    /* Construction Safety Orange/Gold */
            --dark: #2c3e50;       /* Deep Steel Blue/Grey */
            --light: #f8f9fa;      /* Off-White */
            --text: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            color: var(--text);
            background-color: #f4f6f7;
            line-height: 1.6;
        }

        /* Navigation Bar */
        header {
            background-color: var(--dark);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header .logo {
            color: white;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        header .logo span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.3s;
            padding: 5px 0;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-divider {
            color: rgba(255, 255, 255, 0.4); 
            margin: 0 12px;
            font-size: 14px;
            user-select: none;
        }

        .nav-links .active-nav {
            color: white;
            position: relative;
        }

        .nav-links .active-nav::after {
            content: '';
            position: absolute;
            bottom: -18px; 
            left: 40%;
            width: 20%;
            height: 6px;
            background-color: var(--primary); 
        }

        /* Hero Banner */
        .hero-banner {
            background: linear-gradient(rgba(44, 62, 80, 0.9), rgba(44, 62, 80, 0.9));
            color: white;
            text-align: center;
            padding: 50px 20px;
        }

        .hero-banner h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .hero-banner p {
            font-size: 16px;
            color: #bdc3c7;
        }

        /* Modern Details Strip (From image_cdf95f.png) */
        .details-strip-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .details-strip-container {
                grid-template-columns: 1.2fr 1fr 1fr 1fr;
                gap: 0;
            }
            .strip-col:not(:last-child) {
                border-right: 1px solid #e0e0e0;
                padding-right: 25px;
            }
            .strip-col:not(:first-child) {
                padding-left: 25px;
            }
        }

        .strip-col h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--dark);
            line-height: 1.2;
            text-transform: uppercase;
        }

        .strip-col .label-tag {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #777777;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .strip-col h3 {
            font-size: 16px;
            text-transform: uppercase;
            color: var(--dark);
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .strip-col p {
            font-size: 14px;
            color: #555555;
            margin-bottom: 5px;
        }

        .strip-col a {
            color: var(--text);
            text-decoration: none;
            font-weight: bold;
        }

        .strip-col a:hover {
            color: var(--primary);
        }

        /* Contact Section Form Container */
        .contact-section {
            padding: 20px 20px 60px 20px;
            max-width: 700px;
            margin: 0 auto;
        }

        .form-container-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .form-container-box h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
            color: var(--dark);
            position: relative;
            padding-bottom: 10px;
        }

        .form-container-box h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            background-color: var(--primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--dark);
            font-size: 14px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.1);
        }

        .submit-btn {
            background-color: var(--dark);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            border-radius: 4px;
            text-transform: uppercase;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: var(--primary);
        }

        /* Footer */
        footer {
            background-color: var(--dark);
            color: #bdc3c7;
            text-align: center;
            padding: 30px 20px;
            font-size: 14px;
            margin-top: 60px;
        }
    </style>
</head>
