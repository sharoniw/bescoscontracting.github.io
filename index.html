<section class="contact-page-container">
  
  <!-- Left Side: Contact Information Cards -->
  <div class="contact-info-panel">
    <h2>Get In Touch</h2>
    <p class="subtitle">For more information or questions regarding our contracting services, please reach out or send us a message.</p>
    
    <div class="info-card-grid">
      <div class="info-card">
        <div class="card-icon">📞</div>
        <h3>Call Us</h3>
        <p><a href="tel:4436008459">(443) 600-8459</a></p>
      </div>
      
      <div class="info-card">
        <div class="card-icon">✉️</div>
        <h3>Message Us</h3>
        <p><a href="mailto:info@bescoscontracting.org">info@bescoscontracting.org</a></p>
      </div>
      
      <div class="info-card">
        <div class="card-icon">📍</div>
        <h3>Service Area</h3>
        <p>Serving Baltimore & Surrounding Maryland Areas</p>
      </div>
    </div>
  </div>

  <!-- Right Side: Formspree Action Form -->
  <div class="contact-form-panel">
    <h3>Send A Message</h3>
    <form action="https://formspree.io/f/your_endpoint_here" method="POST" class="styled-action-form">
      <div class="form-group">
        <label for="full-name">Full Name</label>
        <input type="text" id="full-name" name="name" required placeholder="John Doe">
      </div>
      
      <div class="form-group">
        <label for="email-address">Email Address</label>
        <input type="email" id="email-address" name="_replyto" required placeholder="johndoe@example.com">
      </div>

      <div class="form-group">
        <label for="phone-number">Phone Number</label>
        <input type="tel" id="phone-number" name="phone" placeholder="(410) 555-0100">
      </div>
      
      <div class="form-group">
        <label for="message">Project Details / Message</label>
        <textarea id="message" name="message" rows="5" required placeholder="Tell us about your project..."></textarea>
      </div>
      
      <button type="submit" class="submit-btn">Submit Request</button>
    </form>
  </div>

</section>
